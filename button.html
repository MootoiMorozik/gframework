<!DOCTYPE html>
<html lang="ru">
<head>
     <title>Test</title>
     <link rel="stylesheet" href="gframework.css">
     <style>
.material-button {
    background-color: violet;
    border-radius: 30px;
    color: white; 
    border: none;
    padding: 8px 15px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
    text-transform: none;
}

.material-button:hover {
    background-color: darkviolet;
}
.material-icon-button {
    text-transform: none;
}

</style>
</head>
<body>
 <button class="material-button">GFramework</button>
<button class="material-icon-button"> <span class="material-symbols-outlined">icon</span> </button> 
<script src="gframework.js"></script>

</body>
</html>
